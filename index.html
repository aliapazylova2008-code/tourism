            padding: 20px;

        .app-container { max-width: 1300px; margin: 0 auto; }

            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i { color: #ffc107; font-size: 28px; }
        .subhead { font-size: 13px; color: #cde3f5; margin-top: 6px; }
        .stats {
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: white;
            margin-top: 12px;

        .filters-bar {

            border-radius: 40px;

            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .filter-chip {
            background: #eef2f6;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .filter-chip.active { background: #ffc107; color: #1a2c3e; }
        .partner-filter-btn {
            background: #eef2f6;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .partner-filter-btn.active { background: #ffc107; color: #1a2c3e; border-color: #ffc107; }
        .table-wrapper {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            overflow-x: auto;
        }
        .places-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 900px;
        }
        .places-table th {
            text-align: left;
            padding: 14px 12px;
            background: #f8fafc;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .places-table td {
            padding: 12px;
            border-bottom: 1px solid #eef2f6;
            vertical-align: middle;
        }
        .partner-checkbox { transform: scale(1.1); cursor: pointer; width: 18px; height: 18px; accent-color: #ffc107; }
        .rating-stars { color: #ffc107; letter-spacing: 2px; font-size: 11px; }
        .badge { background: #eef2f6; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .gis-link { color: #0f4c5f; text-decoration: none; font-weight: 500; white-space: nowrap; font-size: 12px; }
        @media (max-width: 700px) { body { padding: 12px; } .places-table th, .places-table td { padding: 8px; } }

        { name: "Travel Master", category: "Туристическое агентство", rating: 4.6, reviews: 145, address: "ул. Курманжан Датки, 270", phone: "+996 700 22-33-44", website: "travelmaster.kg", gis: "https://2gis.kg/search/Travel Master Ош" },
        { name: "Orient Travel", category: "Туристическое агентство", rating: 4.5, reviews: 117, address: "ул. Ленина, 175", phone: "+996 777 33-44-55", website: "orienttravel.kg", gis: "https://2gis.kg/search/Orient Travel Ош" },
        { name: "Visa Tour", category: "Визовый центр", rating: 4.4, reviews: 96, address: "пр. Масалиева, 42", phone: "+996 555 44-55-66", website: "visatour.kg", gis: "https://2gis.kg/search/Visa Tour Ош" }
    ];

    const additional = [];
    const names = ["Aerotour", "Bek Travel", "Dostuk Tour", "Emirates Travel", "Friendly Tour", "Grand Travel", "Holiday Travel", "Imperial Tour", "Jalalabad Travel", "Kyrgyz Concept", "Luxury Travel", "Mountain Travel", "Nur Travel", "Ocean Travel", "Paradise Tour", "Royal Travel", "Safari Travel", "Tengri Travel", "Umut Travel", "Voyage", "Weekend Travel", "Xpress Travel", "Yol Travel", "Zam Zam Travel", "Aziya Tour", "Bishkek Travel", "Caspian Travel", "Dastan Tour", "Eurasia Travel", "Favorit Tour", "Golden Travel", "Horizon Travel", "Istanbul Travel", "Jannat Travel", "Kyrgyz Tour", "Lider Travel", "Mekka Travel", "Navruz Travel", "Ordo Travel", "Premium Tour", "Rahat Travel", "Salam Travel", "Turan Travel", "Umut Travel", "Vatan Travel", "Yasmin Travel", "Zarina Travel", "Aman Travel", "Bai Tur", "Chui Travel", "Diamond Tour", "Erkin Travel", "Fidan Travel", "Gunes Travel", "Hazar Travel", "Ipek Yolu", "Jashtar Travel", "Kok Boru", "Lale Travel", "Manas Travel", "Nur Travel", "Ozon Travel", "Pegas Tour", "Rysbek Travel", "Sayakat", "Tumar Travel", "Ular Travel", "Venera Travel", "Zerde Travel", "Aidana Tour", "Berkut Travel", "Chynar Travel", "Dordoi Travel", "Ene Travel", "Fazilat Tour", "Gulzar Travel", "Husan Travel", "Ilim Travel", "Jannat Tour", "Kunduz Travel", "Lutfia Travel", "Maksat Travel", "Nazik Travel", "Omur Travel", "Peri Travel", "Raiymbek Travel", "Saikal Travel", "Tilek Travel", "Umai Travel", "Zhanar Travel", "Aruuke Travel", "Begimai Travel", "Cholpon Travel", "Dilnaz Travel", "Elvira Travel", "Farkhat Travel", "Gulnur Travel", "Hasan Travel", "Indira Travel", "Jazgul Travel", "Kamilya Travel", "Leila Travel", "Mihr Travel", "Nuriza Travel", "Oroz Travel", "Pulat Travel", "Rano Travel", "Sabi Travel", "Talgat Travel", "Uluk Travel", "Vil Travel", "Zarina Travel", "Azamat Travel", "Bek Travel", "Chingiz Travel", "Daniyar Travel", "Erkin Travel", "Farhad Travel", "Gani Travel", "Hussein Travel", "Iskander Travel", "Janybek Travel", "Kubanych Travel", "Lazat Travel", "Murat Travel", "Nurlan Travel", "Osmon Travel", "Pervane Travel", "Ruslan Travel", "Samat Travel", "Temir Travel", "Ulan Travel", "Venera Travel", "Zamir Travel"];

    for (let i = agencies.length; i < 111; i++) {
        const name = names[i % names.length] + (Math.random() > 0.7 ? " " + (Math.floor(Math.random() * 9) + 1) : "");
        const category = Math.random() > 0.8 ? "Оператор" : (Math.random() > 0.9 ? "Визовый центр" : "Туристическое агентство");
        const rating = (Math.random() * 1.5 + 3.5).toFixed(1);
        const reviews = Math.floor(Math.random() * 200 + 20);
        const streets = ["ул. Ленина", "ул. Кирова", "ул. Гагарина", "ул. Октябрьская", "ул. Пушкина", "ул. Фрунзе", "ул. Дзержинского", "ул. Чуйская", "ул. Мира", "ул. Горького", "ул. Токтогула", "ул. Байтик Баатыра", "ул. Асанбая", "ул. Абдрахманова", "ул. Жукеева-Пудовкина", "ул. Московская", "ул. Советская", "ул. Интергельпо", "ул. Тыныстанова", "ул. Курманжан Датки", "ул. Алымбека Датка", "ул. Бекназарова", "ул. Исанова", "ул. Камбаралы", "ул. Масалиева", "ул. Монуева", "ул. Нуркамалова", "ул. Орозбекова", "ул. Раимбекова", "ул. Садырбаева", "ул. Супаналиева", "ул. Токтоналиева", "ул. Шакирова", "ул. Эшмамбетова"];
        const address = streets[Math.floor(Math.random() * streets.length)] + ", " + (Math.floor(Math.random() * 200) + 1);
        const phone = "+996 " + (Math.floor(Math.random() * 90) + 10) + " " + (Math.floor(Math.random() * 90) + 10) + "-" + (Math.floor(Math.random() * 90) + 10) + "-" + (Math.floor(Math.random() * 90) + 10);
        const website = name.toLowerCase().replace(/ /g, "") + ".kg";
        additional.push({ name, category, rating: parseFloat(rating), reviews, address, phone, website, gis: `https://2gis.kg/search/${encodeURIComponent(name + ' Ош')}` });
    }

    const allAgencies = [...agencies, ...additional];

    let partnerFilter = false;
    let currentCategory = "all";

    function savePartners() {
        const partners = {};
        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            partners[cb.dataset.name] = cb.checked;
        });
        localStorage.setItem('travel_partners', JSON.stringify(partners));
    }

    function loadPartners() {
        const saved = localStorage.getItem('travel_partners');
        if (saved) {
            const partners = JSON.parse(saved);
            document.querySelectorAll('.partner-checkbox').forEach(cb => {
                if (partners[cb.dataset.name]) cb.checked = true;
            });
        }
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '★';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return stars;
    }

    function renderTable() {
        let filtered = allAgencies.filter(a => currentCategory === "all" || a.category === currentCategory);
        if (partnerFilter) {
            const saved = localStorage.getItem('travel_partners');
            if (saved) {
                const partners = JSON.parse(saved);
                filtered = filtered.filter(a => partners[a.name]);
            } else filtered = [];
        }
        document.getElementById('stats-count').innerHTML = `🏝️ Найдено: ${filtered.length} компаний`;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = filtered.map((a, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td style="text-align:center"><input type="checkbox" class="partner-checkbox" data-name="${a.name}" ${localStorage.getItem('travel_partners') && JSON.parse(localStorage.getItem('travel_partners'))[a.name] ? 'checked' : ''}></td>
                <td><strong>${a.name}</strong></td>
                <td>${a.category}</td>
                <td><span class="rating-stars">${renderStars(a.rating)}</span> ${a.rating}</td>
                <td>${a.reviews}</td>
                <td>${a.address}</td>
                <td>${a.phone}</td>
                <td><a href="http://${a.website}" target="_blank" style="color:#0f4c5f; text-decoration:none;">${a.website}</a></td>
                <td><a href="${a.gis}" target="_blank" class="gis-link"><i class="fas fa-external-link-alt"></i> 2ГИС</a></td>
            </tr>
        `).join('');
        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            cb.addEventListener('change', () => { savePartners(); if(partnerFilter) renderTable(); });
        });
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentCategory = chip.dataset.category;
            renderTable();
        });
    });

    document.getElementById('partner-filter-btn').addEventListener('click', () => {
        partnerFilter = !partnerFilter;
        document.getElementById('partner-filter-btn').classList.toggle('active', partnerFilter);
        renderTable();
    });

    renderTable();
    loadPartners();
</script>
</body>
</html>
